services:
  api:
    build:
      context: .
      dockerfile: api/Dockerfile
      network: host
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./monitoring:/app/monitoring
    environment:
      - PORT=8000

  dashboard:
    build:
      context: .
      dockerfile: dashboard/Dockerfile
      network: host
    ports:
      - "8501:8501"
    environment:
      - API_URL=http://api:8000
    depends_on:
      - api
